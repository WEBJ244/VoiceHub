<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub | Secure Retro</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --retro-cream: #FDF5E6;
            --retro-teal: #92C5C5;
            --retro-salmon: #F2A6A6;
            --retro-sand: #E6D5B8;
            --ink: #333333;
        }

        body {
            background-color: var(--retro-cream);
            background-image: radial-gradient(rgba(0,0,0,0.05) 1.5px, transparent 0);
            background-size: 15px 15px;
            font-family: 'Comic Neue', cursive;
            margin: 0; padding: 0; color: var(--ink);
        }

        .portal { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }

        .header {
            text-align: center; background: var(--retro-sand);
            border: 4px solid var(--ink); padding: 1.5rem;
            margin-bottom: 2rem; box-shadow: 10px 10px 0px var(--ink);
        }

        .brand-name { font-family: 'Bangers', cursive; font-size: 60px; margin: 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab {
            flex: 1; padding: 15px; font-family: 'Bangers', cursive; font-size: 22px;
            border: 4px solid var(--ink); background: white; cursor: pointer;
            box-shadow: 5px 5px 0px var(--ink);
        }
        .tab.active { background: var(--retro-teal); transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--ink); }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: white; border: 4px solid var(--ink);
            padding: 25px; margin-bottom: 25px; box-shadow: 8px 8px 0px var(--ink);
        }

        .removed-card {
            background-color: #fff0f0 !important;
            border-color: var(--retro-salmon) !important;
        }

        .rules-box {
            background: #fffbe6; border: 3px dashed var(--ink);
            padding: 15px; margin-bottom: 20px;
        }
        .rules-header { font-family: 'Bangers'; color: var(--retro-salmon); font-size: 20px; }

        .lbl { font-family: 'Bangers', cursive; font-size: 24px; display: block; margin-bottom: 12px; }
        
        .choice-btn {
            padding: 10px 20px; border: 3px solid var(--ink);
            font-family: 'Bangers', cursive; font-size: 18px; cursor: pointer; background: white;
            box-shadow: 4px 4px 0px var(--ink); margin-right: 10px; margin-bottom: 10px;
        }

        .sel-active { background: var(--retro-teal) !important; }
        .submit-btn {
            width: 100%; padding: 20px; background: var(--retro-salmon);
            font-family: 'Bangers', cursive; font-size: 32px; border: 4px solid var(--ink);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink);
        }

        .status-tag { font-family: 'Bangers'; padding: 4px 10px; border: 2px solid var(--ink); float: right; background: var(--retro-sand); }
        
        .admin-note {
            margin-top: 15px; padding: 10px; border-left: 5px solid var(--retro-salmon);
            background: #ffe6e6; font-family: 'Permanent Marker', cursive; font-size: 18px;
        }

        .admin-input {
            width: 100%; padding: 10px; border: 2px solid var(--ink);
            margin-bottom: 10px; font-family: 'Comic Neue'; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="portal">
    <div class="header"><h1 class="brand-name">VOICE HUB</h1></div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('submit', this)">DISPATCH</button>
        <button class="tab" onclick="showTab('board', this)">THE HUB</button>
        <button class="tab" onclick="showTab('admin', this)">ADMIN</button>
    </div>

    <div id="submit" class="section active">
        <div class="rules-box">
            <span class="rules-header">🛡️ SAFETY PROTOCOLS</span>
            <ul style="margin: 10px 0 0 20px; font-weight: bold;">
                <li>Keep it Anonymous: No real names or identifying info.</li>
                <li>Stay Safe: Use this space for constructive feedback, not harassment.</li>
                <li>Privacy: Data is stored securely and monitored for safety.</li>
            </ul>
        </div>

        <div class="card">
            <label class="lbl">CATEGORY</label>
            <div id="cat-group">
                <button class="choice-btn" onclick="setVal('cat', 'Conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setVal('cat', 'Management', this)">Management</button>
                <button class="choice-btn" onclick="setVal('cat', 'Policy', this)">Policy</button>
                <button class="choice-btn" onclick="setVal('cat', 'Wellbeing', this)">Wellbeing</button>
            </div>
            <label class="lbl">URGENCY</label>
            <div id="sev-group">
                <button class="choice-btn" onclick="setVal('sev', 'Low', this)">Low</button>
                <button class="choice-btn" onclick="setVal('sev', 'Medium', this)">Medium</button>
                <button class="choice-btn" onclick="setVal('sev', 'High', this)">High</button>
            </div>
            <textarea id="fb-text" style="width:100%; height:120px; border:3px solid var(--ink); padding:10px; margin-bottom:15px; box-sizing: border-box;" placeholder="Enter dispatch details..."></textarea>
            <button class="submit-btn" onclick="submitToFirebase()">SEND DISPATCH</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-grid"></div>
    </div>

    <div id="admin" class="section">
        <div id="admin-gate" class="card" style="text-align:center;">
            <label class="lbl">ADMIN KEY</label>
            <input type="password" id="admin-pw" style="padding:10px; font-size:18px; border:3px solid black;">
            <br><br>
            <button class="choice-btn" onclick="tryLogin()">UNLOCK ADMIN</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <label class="lbl">ADMIN DASHBOARD</label>
                <button class="choice-btn" style="background:var(--retro-salmon);" onclick="logout()">SECURE LOGOUT</button>
            </div>
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCg5LSNh0EIKjv5eQKPpWT8ZMF49zQX9Dc",
        authDomain: "voice-hub-portal.firebaseapp.com",
        databaseURL: "https://voice-hub-portal-default-rtdb.firebaseio.com",
        projectId: "voice-hub-portal",
        storageBucket: "voice-hub-portal.firebasestorage.app",
        messagingSenderId: "1052590708905",
        appId: "1:1052590708905:web:50237423f82a3c4ceeb1b8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const reportsRef = db.ref('reports');

    let selections = { cat: '', sev: '' };

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function setVal(type, val, btn) {
        selections[type] = val;
        document.querySelectorAll(`#${type}-group .choice-btn`).forEach(b => b.classList.remove('sel-active'));
        btn.classList.add('sel-active');
    }

    function submitToFirebase() {
        const text = document.getElementById('fb-text').value;
        if(!selections.cat || !selections.sev || !text) return alert("All fields are mandatory!");
        reportsRef.push({ 
            cat: selections.cat, 
            sev: selections.sev, 
            text: text, 
            date: new Date().toLocaleDateString(), 
            status: 'active',
            comment: '' 
        });
        document.getElementById('fb-text').value = '';
        alert("Dispatch Sent!");
    }

    function tryLogin() {
        if(document.getElementById('admin-pw').value === 'Chat2026') {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("ACCESS DENIED"); }
    }

    function logout() {
        document.getElementById('admin-pw').value = '';
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('admin-gate').style.display = 'block';
    }

    function adminAction(id, newStatus) { 
        const commentBox = document.getElementById('comment-' + id);
        const commentValue = commentBox.value;

        if (!commentValue && (newStatus === 'resolved' || newStatus === 'removed')) {
            return alert("Please provide feedback/reason first!");
        }

        db.ref('reports/' + id).update({
            status: newStatus,
            comment: commentValue
        }).then(() => {
            if(newStatus === 'resolved') alert("Feedback Sent & Resolved!");
            if(newStatus === 'removed') alert("Dispatch Redacted & Hidden.");
            if(newStatus === 'active') alert("Comment Saved!");
        });
    }

    function hardDelete(id) {
        if(confirm("CRITICAL: Permanently delete this from the database?")) {
            db.ref('reports/' + id).remove().then(() => alert("Entry Erased."));
        }
    }

    reportsRef.on('value', (snap) => {
        const data = snap.val();
        const grid = document.getElementById('board-grid');
        const adminGrid = document.getElementById('admin-list');
        grid.innerHTML = ''; adminGrid.innerHTML = '';
        if(!data) return;

        Object.keys(data).reverse().forEach(id => {
            const r = data[id];
            const isRemoved = r.status === 'removed';

            grid.innerHTML += `
                <div class="card ${isRemoved ? 'removed-card' : ''}">
                    <span class="status-tag">${r.status.toUpperCase()}</span>
                    <label class="lbl" style="font-size:16px;">${r.cat} | ${r.sev}</label>
                    <p style="font-size:20px; font-weight:bold; margin:10px 0;">
                        ${isRemoved ? '[ CONTENT REMOVED BY MODERATOR ]' : `"${r.text}"`}
                    </p>
                    ${r.comment ? `<div class="admin-note">ADMIN FEEDBACK: ${r.comment}</div>` : ''}
                    <small>${r.date}</small>
                </div>`;
            
            adminGrid.innerHTML += `
                <div class="card">
                    <p><b>Original Text:</b> ${r.text}</p>
                    <textarea id="comment-${id}" class="admin-input" placeholder="Type feedback here...">${r.comment || ''}</textarea>
                    <div style="margin-top:10px;">
                        <button class="choice-btn" style="background:#e6d5b8;" onclick="adminAction('${id}','active')">COMMENT</button>
                        <button class="choice-btn" style="background:#ccffcc;" onclick="adminAction('${id}','resolved')">RESOLVE</button>
                        <button class="choice-btn" style="background:#ffcccc;" onclick="adminAction('${id}','removed')">REMOVE (HIDE)</button>
                        <button class="choice-btn" style="background:#000; color:#fff;" onclick="hardDelete('${id}')">HARD DELETE</button>
                    </div>
                </div>`;
        });
    });
</script>
</body>
</html>
