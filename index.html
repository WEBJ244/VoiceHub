<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safe Harbour Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --comic-yellow: #FFF8B0;
            --comic-pink: #FFD1DC;
            --comic-blue: #B0E0E6;
            --comic-green: #C1F0C1;
            --comic-red: #FF6B6B;
            --ink-black: #222222;
            --paper-white: #FFFFFF;
            --border-thick: 3px;
            --dot-bg: radial-gradient(rgba(0,0,0,0.05) 1px, transparent 0);
        }

        body {
            background-color: #fafafa;
            background-image: var(--dot-bg);
            background-size: 24px 24px;
            font-family: 'Comic Neue', cursive;
            color: var(--ink-black);
            margin: 0;
            padding: 0;
        }

        .portal { max-width: 850px; margin: 0 auto; padding: 2rem 1rem; }

        /* HEADER */
        .header {
            text-align: center;
            background: var(--comic-yellow);
            border: var(--border-thick) solid var(--ink-black);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 10px 10px 0px var(--ink-black);
            transform: rotate(-0.5deg);
        }

        .brand-name {
            font-family: 'Bangers', cursive;
            font-size: 52px;
            letter-spacing: 3px;
            text-shadow: 3px 3px 0px white;
            margin: 0;
        }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 12px;
            font-family: 'Bangers', cursive;
            font-size: 18px;
            border: var(--border-thick) solid var(--ink-black);
            background: white;
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--ink-black);
        }
        .tab.active { background: var(--comic-blue); transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--ink-black); }

        /* CARDS */
        .card {
            background: white;
            border: var(--border-thick) solid var(--ink-black);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0px var(--ink-black);
        }

        .section { display: none; }
        .section.active { display: block; }

        /* INPUTS */
        .lbl { font-family: 'Bangers', cursive; font-size: 20px; display: block; margin-bottom: 10px; }
        .msg-area { width: 100%; height: 120px; border: var(--border-thick) solid var(--ink-black); padding: 10px; font-family: inherit; font-weight: bold; }
        
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .choice-btn {
            padding: 8px 15px; border: 2px solid var(--ink-black);
            font-family: 'Bangers', cursive; cursor: pointer; background: white;
            box-shadow: 3px 3px 0px var(--ink-black);
        }

        /* ACTION COLORS */
        .sel-conflict, .sel-high { background: var(--comic-red) !important; color: white; }
        .sel-management, .sel-med { background: var(--comic-yellow) !important; }
        .sel-policy { background: var(--comic-blue) !important; }
        .sel-wellbeing, .sel-low { background: var(--comic-green) !important; }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--comic-red); color: white;
            font-family: 'Bangers', cursive; font-size: 24px; border: var(--border-thick) solid var(--ink-black);
            cursor: pointer; box-shadow: 5px 5px 0px var(--ink-black);
        }

        /* ADMIN BUTTONS */
        .act-btn {
            font-family: 'Bangers', cursive; padding: 5px 12px; border: 2px solid black;
            cursor: pointer; box-shadow: 2px 2px 0px black; margin-right: 5px;
        }
        .btn-soft { background: var(--comic-yellow); }
        .btn-delete { background: var(--ink-black); color: white; }

        .badge { font-family: 'Bangers', cursive; padding: 2px 8px; border: 1px solid black; margin-right: 5px; font-size: 12px; }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <h1 class="brand-name">Safe Harbour</h1>
        <p style="font-family:'Permanent Marker'">GLOBAL FEEDBACK PORTAL</p>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="openTab('submit')">FILE REPORT</button>
        <button class="tab" onclick="openTab('board')">PUBLIC BOARD</button>
        <button class="tab" onclick="openTab('admin')">ADMIN HQ</button>
    </div>

    <div id="submit" class="section active">
        <div class="card">
            <label class="lbl">CATEGORY</label>
            <div class="btn-group" id="cat-group">
                <button class="choice-btn" onclick="setCat('conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setCat('management', this)">Management</button>
                <button class="choice-btn" onclick="setCat('policy', this)">Policy</button>
                <button class="choice-btn" onclick="setCat('wellbeing', this)">Wellbeing</button>
            </div>

            <label class="lbl">URGENCY</label>
            <div class="btn-group" id="sev-group">
                <button class="choice-btn" onclick="setSev('low', this)">Low</button>
                <button class="choice-btn" onclick="setSev('medium', this)">Medium</button>
                <button class="choice-btn" onclick="setSev('high', this)">High</button>
            </div>

            <label class="lbl">MESSAGE</label>
            <textarea id="msg-input" class="msg-area" placeholder="Speak your truth..."></textarea>
            <br><br>
            <button class="submit-btn" onclick="submitReport()">SEND DISPATCH</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-content"></div>
    </div>

    <div id="admin" class="section">
        <div id="admin-login" class="card" style="text-align:center;">
            <label class="lbl">TOP SECRET ACCESS</label>
            <input type="password" id="admin-pass" style="padding:10px; border:2px solid black; width:200px;"><br><br>
            <button class="choice-btn" onclick="login()">ENTER HQ</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <div id="admin-content"></div>
        </div>
    </div>
</div>

<script>
    // 1. DATA PERSISTENCE (LocalStorage)
    // To make this work for "other people", you would replace this with a Fetch call to a database.
    let reports = JSON.parse(localStorage.getItem('sh_reports')) || [];
    let currentCat = '';
    let currentSev = '';

    function save() {
        localStorage.setItem('sh_reports', JSON.stringify(reports));
    }

    function openTab(tabId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'board') renderBoard();
        if(tabId === 'admin') renderAdmin();
    }

    function setCat(val, btn) {
        currentCat = val;
        document.querySelectorAll('#cat-group .choice-btn').forEach(b => b.className = 'choice-btn');
        btn.classList.add('sel-' + val);
    }

    function setSev(val, btn) {
        currentSev = val;
        document.querySelectorAll('#sev-group .choice-btn').forEach(b => b.className = 'choice-btn');
        btn.classList.add('sel-' + val);
    }

    function submitReport() {
        const text = document.getElementById('msg-input').value;
        if(!currentCat || !currentSev || !text) return alert("Fill everything out!");

        const newReport = {
            id: Date.now(),
            cat: currentCat,
            sev: currentSev,
            text: text,
            date: new Date().toLocaleDateString(),
            removed: false,
            reason: ''
        };

        reports.unshift(newReport);
        save();
        alert("KAPOW! Message sent.");
        location.reload(); 
    }

    function renderBoard() {
        const container = document.getElementById('board-content');
        container.innerHTML = reports.map(r => `
            <div class="card" style="${r.removed ? 'opacity:0.5; border-style:dashed;' : ''}">
                ${r.removed ? 
                    `<h2 style="font-family:Bangers; color:red;">[ REDACTED BY ADMIN ]</h2><p>Reason: ${r.reason}</p>` : 
                    `<div>
                        <span class="badge sel-${r.cat}">${r.cat.toUpperCase()}</span>
                        <span class="badge sel-${r.sev}">${r.sev.toUpperCase()}</span>
                    </div>
                    <p style="font-size:18px; font-weight:bold;">${r.text}</p>
                    <small>${r.date}</small>`
                }
            </div>
        `).join('');
    }

    function renderAdmin() {
        const container = document.getElementById('admin-content');
        container.innerHTML = reports.map(r => `
            <div class="card">
                <p><strong>ID: ${r.id}</strong> [${r.cat}]</p>
                <p>${r.text}</p>
                <button class="act-btn btn-soft" onclick="softRemove(${r.id})">Soft Remove</button>
                <button class="act-btn btn-delete" onclick="hardDelete(${r.id})">DELETE PERMANENTLY</button>
            </div>
        `).join('');
    }

    function softRemove(id) {
        const reason = prompt("Why are you removing this from the public board?");
        if(reason) {
            const r = reports.find(x => x.id === id);
            r.removed = true;
            r.reason = reason;
            save();
            renderAdmin();
        }
    }

    function hardDelete(id) {
        if(confirm("DANGER! This deletes the data forever from the system. Proceed?")) {
            reports = reports.filter(x => x.id !== id);
            save();
            renderAdmin();
        }
    }

    function login() {
        if(document.getElementById('admin-pass').value === 'Chat2026') {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            renderAdmin();
        } else {
            alert("WRONG PASSWORD!");
        }
    }
</script>

</body>
</html>
