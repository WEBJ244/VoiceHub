<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub</title>
    <style>
        /* Using Bangers and Comic Neue for that pop-art vibe */
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            /* High-Energy Primary Colors from Inspiration Image */
            --pop-yellow: #FFDE00;
            --pop-red: #ED1C24;
            --pop-blue: #0081FF;
            --pop-cyan: #00DFFF;
            --ink-black: #000000;
            --white: #FFFFFF;
            
            --border-width: 4px;
            
            /* TRUE HALFTONE DOTS: This creates the classic comic texture over everything */
            --halftone-bg: radial-gradient(rgba(0,0,0,0.12) 1.5px, transparent 0);
        }

        body {
            background-color: #f7f7f7;
            background-image: var(--halftone-bg);
            background-size: 16px 16px; /* Dot density */
            font-family: 'Comic Neue', cursive;
            margin: 0; padding: 0; color: var(--ink-black);
        }

        .portal { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* HEADER: Solid yellow block with a heavy action shadow */
        .header {
            text-align: center;
            background: var(--pop-yellow);
            border: var(--border-width) solid var(--ink-black);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 12px 12px 0px var(--ink-black);
            transform: rotate(-1.5deg); /* Dynamic tilt */
        }

        .brand-icon {
            width: 70px; height: 70px;
            background: var(--ink-black);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex; align-items: center; justify-content: center;
            border: var(--border-width) solid var(--white);
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2);
        }
        .brand-icon svg { width: 40px; height: 40px; fill: var(--pop-yellow); }
        .brand-name { font-family: 'Bangers', cursive; font-size: 60px; margin: 0; letter-spacing: 3px; -webkit-text-stroke: 1px var(--ink-black); }

        /* TABS: Bold cyan and white buttons with a block shadow */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab {
            flex: 1; padding: 15px; font-family: 'Bangers', cursive; font-size: 24px;
            border: var(--border-width) solid var(--ink-black); background: var(--white);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black);
            transition: 0.1s;
        }
        .tab.active { background: var(--pop-cyan); transform: translate(3px, 3px); box-shadow: 3px 3px 0px var(--ink-black); }

        /* SECTION LAYOUT */
        .section { display: none; }
        .section.active { display: block; }

        /* CARDS: Bold white blocks with heavy ink lines */
        .card {
            background: var(--white); border: var(--border-width) solid var(--ink-black);
            padding: 25px; margin-bottom: 25px; box-shadow: 10px 10px 0px var(--ink-black);
            position: relative;
        }

        .lbl { font-family: 'Bangers', cursive; font-size: 26px; display: block; margin-bottom: 15px; color: var(--pop-red); text-transform: uppercase; }
        
        .choice-btn {
            padding: 10px 20px; border: 3px solid var(--ink-black);
            font-family: 'Bangers', cursive; font-size: 18px; cursor: pointer; background: var(--white);
            box-shadow: 4px 4px 0px var(--ink-black); margin-right: 12px; margin-bottom: 12px;
            transition: 0.05s;
        }
        .choice-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--ink-black); }

        /* Primary Coloring for States based on image */
        .sel-management, .sel-med { background: var(--pop-yellow) !important; color: var(--ink-black) !important;}
        .sel-policy, .sel-high { background: var(--pop-blue) !important; color: var(--white) !important; }
        .sel-wellbeing, .sel-low { background: var(--pop-cyan) !important; color: var(--ink-black) !important; }
        .sel-conflict, .sel-removed { background: var(--pop-red) !important; color: var(--white) !important; }

        .msg-area { 
            width: 100%; height: 150px; border: var(--border-width) solid var(--ink-black); 
            padding: 15px; font-family: inherit; font-size: 18px; font-weight: bold; 
            box-shadow: inset 4px 4px 0px rgba(0,0,0,0.05); border-radius: 0;
        }

        /* SEND BUTTON: Bold red action button */
        .submit-btn {
            width: 100%; padding: 20px; background: var(--pop-red); color: var(--white);
            font-family: 'Bangers', cursive; font-size: 32px; border: var(--border-width) solid var(--ink-black);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black); margin-top: 10px;
        }
        .submit-btn:active { transform: translate(3px, 3px); box-shadow: 3px 3px 0px var(--ink-black); }

        /* Board Styling */
        .status-tag { font-family: 'Bangers'; padding: 2px 8px; border: 2px solid var(--ink-black); float: right; margin-left: 10px; }
        .fb-text { font-size: 22px; line-height: 1.6; font-weight: bold; margin: 15px 0; -webkit-text-stroke: 0.5px var(--ink-black); }
        .fb-date { font-family: 'Permanent Marker'; font-size: 14px; color: #555; }
        .admin-comment { color: var(--pop-red); font-weight: bold; font-family: 'Permanent Marker'; }

        /* Admin Gate */
        .gate-wrap { text-align: center; padding: 50px 0; }
        .gate-wrap input { 
            padding: 12px; border: var(--border-width) solid var(--ink-black); 
            font-size: 24px; font-family: 'Bangers', cursive; width: 280px;
        }

        .admin-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <h1 class="brand-name">Voice Hub</h1>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('submit', this)">SEND DISPATCH!</button>
        <button class="tab" onclick="showTab('board', this)">THE HUB</button>
        <button class="tab" onclick="showTab('admin', this)">ADMIN HQ</button>
    </div>

    <div id="submit" class="section active">
        <div class="card">
            <label class="lbl">CATEGORY MISSION</label>
            <div id="cat-group">
                <button class="choice-btn" onclick="setCat('conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setCat('management', this)">Management</button>
                <button class="choice-btn" onclick="setCat('policy', this)">Policy</button>
                <button class="choice-btn" onclick="setCat('wellbeing', this)">Wellbeing</button>
            </div>
            <label class="lbl">URGENCY LEVEL</label>
            <div id="sev-group">
                <button class="choice-btn" onclick="setSev('low', this)">Low</button>
                <button class="choice-btn" onclick="setSev('medium', this)">Medium</button>
                <button class="choice-btn" onclick="setSev('high', this)">High!</button>
            </div>
            <label class="lbl">THE DISPATCH MESSAGE</label>
            <textarea id="fb-text" class="msg-area" placeholder="Speak your truth hero!"></textarea>
            <button class="submit-btn" onclick="submitReport()">BROADCAST NOW!</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-grid"></div>
    </div>

    <div id="admin" class="section">
        <div id="admin-gate" class="card gate-wrap">
            <label class="lbl">ADMIN KEY REQUIRED</label>
            <input type="password" id="admin-pw" style="font-family:'Bangers'; padding:10px;">
            <br><br>
            <button class="choice-btn" onclick="login()">UNLOCk HQ</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <label class="lbl">HQ DASHBOARD</label>
                <button class="choice-btn sel-conflict" onclick="logout()">LOGOUT</button>
            </div>
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Reconnecting the Firebase configuration provided earlier
    const firebaseConfig = {
        apiKey: "AIzaSyCg5LSNh0EIKjv5eQKPpWT8ZMF49zQX9Dc",
        authDomain: "voice-hub-portal.firebaseapp.com",
        databaseURL: "https://voice-hub-portal-default-rtdb.firebaseio.com",
        projectId: "voice-hub-portal",
        storageBucket: "voice-hub-portal.firebasestorage.app",
        messagingSenderId: "1052590708905",
        appId: "1:1052590708905:web:50237423f82a3c4ceeb1b8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const reportsRef = ref(db, 'reports');

    let selCat = ''; let selSev = '';

    window.showTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    window.setCat = (val, btn) => {
        selCat = val;
        document.querySelectorAll('#cat-group .choice-btn').forEach(b => b.className = 'choice-btn');
        btn.classList.add('sel-' + val);
    };

    window.setSev = (val, btn) => {
        selSev = val;
        document.querySelectorAll('#sev-group .choice-btn').forEach(b => b.className = 'choice-btn');
        btn.classList.add(val === 'medium' ? 'sel-med' : 'sel-' + val);
    };

    window.login = () => {
        if(document.getElementById('admin-pw').value === 'Chat2026') {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("ACCESS DENIED!"); }
    };

    window.logout = () => {
        document.getElementById('admin-pw').value = '';
        document.getElementById('admin-gate').style.display = 'block';
        document.getElementById('admin-panel').style.display = 'none';
    };

    window.submitReport = () => {
        const text = document.getElementById('fb-text').value;
        if(!selCat || !selSev || !text) return alert("All sections are mandatory!");
        push(reportsRef, { 
            cat: selCat, sev: selSev, text: text, 
            date: new Date().toLocaleDateString(), 
            status: 'active', comment: '' 
        });
        alert("Broadcast sent successfully!");
        document.getElementById('fb-text').value = '';
        selCat = ''; selSev = '';
        document.querySelectorAll('.choice-btn').forEach(b => b.className = 'choice-btn');
    };

    window.updateStatus = (id, status) => {
        let comment = '';
        if(status === 'resolved' || status === 'removed') {
            comment = prompt("Enter required action/comment (appears on Hub):");
            if(comment === null) return;
        }
        update(ref(db, `reports/${id}`), { status: status, comment: comment });
    };

    window.hardDelete = (id) => {
        if(confirm("DANGER! Confirm Permanent Deletion from Database?")) remove(ref(db, `reports/${id}`));
    };

    // Correcting the real-time syncing so data appears on the board and admin panels
    onValue(reportsRef, (snap) => {
        const data = snap.val();
        const grid = document.getElementById('board-grid');
        const adminGrid = document.getElementById('admin-list');
        grid.innerHTML = ''; adminGrid.innerHTML = '';

        if(!data){
            grid.innerHTML = `<div class="card"><p style="text-align:center;">The Hub is quiet. Be the first to broadcast!</p></div>`;
            return;
        }

        for(let id in data) {
            const r = data[id];
            const isRemoved = r.status === 'removed';
            
            // Public Board rendering with primary colors
            const cardHtml = `<div class="card" style="${isRemoved ? 'opacity:0.6; border-style:dashed;' : ''}">
                <span class="status-tag ${r.status === 'resolved' ? 'sel-low' : (r.status === 'removed' ? 'sel-conflict' : 'sel-med')}">${r.status.toUpperCase()}</span>
                <span class="lbl sel-${r.cat}" style="display:inline-block; padding:2px 8px; border:2px solid black; font-size:16px;">${r.cat} | ${r.sev.toUpperCase()}</span>
                <p class="fb-text">"${isRemoved ? '[ MESSAGE REDACTED ]' : r.text}"</p>
                ${r.comment ? `<p class="admin-comment">HQ ACTION: ${r.comment}</p>` : ''}
                <small class="fb-date">LOGGED: ${r.date}</small>
            </div>`;
            grid.innerHTML = cardHtml + grid.innerHTML;

            // Admin List rendering (logic and sorting preserved)
            adminGrid.innerHTML = `<div class="card">
                <p><strong>ID: ${id} [${r.status.toUpperCase()}]</strong></p>
                <p class="fb-text">${r.text}</p>
                <div class="admin-controls">
                    <button class="choice-btn sel-wellbeing" onclick="updateStatus('${id}', 'resolved')">Resolve</button>
                    <button class="choice-btn sel-med" onclick="updateStatus('${id}', 'removed')">Soft Remove</button>
                    <button class="choice-btn sel-conflict" onclick="hardDelete('${id}')">Hard Delete</button>
                </div>
            </div>` + adminGrid.innerHTML;
        }
    });
</script>
</body>
</html>
