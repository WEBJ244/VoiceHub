<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --comic-yellow: #FFF8B0;
            --comic-pink: #FFD1DC;
            --comic-blue: #B0E0E6;
            --comic-green: #C1F0C1;
            --comic-red: #FF6B6B;
            --ink-black: #222222;
            --border-thick: 3px;
            --halftone: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
        }

        body {
            background-color: #f0f0f0;
            background-image: var(--halftone);
            background-size: 20px 20px;
            font-family: 'Comic Neue', cursive;
            margin: 0; padding: 0;
        }

        .portal { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Updated Header with Ping Icon */
        .header {
            text-align: center;
            background: var(--comic-yellow);
            border: var(--border-thick) solid var(--ink-black);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 12px 12px 0px var(--ink-black);
            transform: rotate(-1deg);
        }

        .brand-icon {
            width: 60px; height: 60px;
            background: var(--ink-black);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid white;
        }

        .brand-icon svg { width: 35px; height: 35px; fill: var(--comic-yellow); }

        .brand-name { font-family: 'Bangers', cursive; font-size: 50px; margin: 0; letter-spacing: 2px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab {
            flex: 1; padding: 12px; font-family: 'Bangers', cursive; font-size: 18px;
            border: var(--border-thick) solid var(--ink-black); background: white;
            cursor: pointer; box-shadow: 5px 5px 0px var(--ink-black);
        }
        .tab.active { background: var(--comic-blue); transform: translate(2px, 2px); box-shadow: 2px 2px 0px var(--ink-black); }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: white; border: var(--border-thick) solid var(--ink-black);
            padding: 20px; margin-bottom: 20px; box-shadow: 8px 8px 0px var(--ink-black);
        }

        .lbl { font-family: 'Bangers', cursive; font-size: 20px; display: block; margin-bottom: 10px; }
        
        .choice-btn {
            padding: 8px 15px; border: 2.5px solid var(--ink-black);
            font-family: 'Bangers', cursive; cursor: pointer; background: white;
            box-shadow: 4px 4px 0px var(--ink-black); margin-right: 8px; margin-bottom: 8px;
        }

        /* Logic Styles */
        .sel-low, .sel-wellbeing { background: var(--comic-green) !important; }
        .sel-med, .sel-management { background: var(--comic-yellow) !important; }
        .sel-high, .sel-conflict { background: var(--comic-red) !important; color: white; }
        .sel-policy { background: var(--comic-blue) !important; }

        .msg-area { width: 100%; height: 120px; border: var(--border-thick) solid var(--ink-black); padding: 10px; font-family: inherit; font-weight: bold; }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--comic-red); color: white;
            font-family: 'Bangers', cursive; font-size: 24px; border: var(--border-thick) solid var(--ink-black);
            cursor: pointer; box-shadow: 5px 5px 0px var(--ink-black);
        }

        .badge { font-family: 'Bangers', cursive; padding: 3px 10px; border: 2px solid black; margin-right: 5px; font-size: 13px; }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <h1 class="brand-name">Voice Hub</h1>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="openTab('submit', this)">DISPATCH</button>
        <button class="tab" onclick="openTab('board', this)">THE HUB</button>
    </div>

    <div id="submit" class="section active">
        <div class="card">
            <label class="lbl">CATEGORY</label>
            <div id="cat-group">
                <button class="choice-btn" onclick="setCat('conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setCat('management', this)">Management</button>
                <button class="choice-btn" onclick="setCat('policy', this)">Policy</button>
                <button class="choice-btn" onclick="setCat('wellbeing', this)">Wellbeing</button>
            </div>

            <label class="lbl">URGENCY</label>
            <div id="sev-group">
                <button class="choice-btn" onclick="setSev('low', this)">Low</button>
                <button class="choice-btn" onclick="setSev('medium', this)">Medium</button>
                <button class="choice-btn" onclick="setSev('high', this)">High</button>
            </div>

            <label class="lbl">MESSAGE</label>
            <textarea id="fb-text" class="msg-area" placeholder="Enter dispatch..."></textarea>
            <br><br>
            <button class="submit-btn" onclick="submitReport()">SEND TO HUB</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-grid"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCg5LSNh0EIKjv5eQKPpWT8ZMF49zQX9Dc",
        authDomain: "voice-hub-portal.firebaseapp.com",
        databaseURL: "https://voice-hub-portal-default-rtdb.firebaseio.com",
        projectId: "voice-hub-portal",
        storageBucket: "voice-hub-portal.firebasestorage.app",
        messagingSenderId: "1052590708905",
        appId: "1:1052590708905:web:50237423f82a3c4ceeb1b8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const reportsRef = ref(db, 'reports');

    let selCat = ''; let selSev = '';

    window.openTab = (id, btn) => {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    };

    window.setCat = (val, btn) => {
        selCat = val;
        document.querySelectorAll('#cat-group .choice-btn').forEach(b => b.classList.remove('sel-conflict','sel-management','sel-policy','sel-wellbeing'));
        btn.classList.add('sel-' + val);
    };

    window.setSev = (val, btn) => {
        selSev = val;
        document.querySelectorAll('#sev-group .choice-btn').forEach(b => b.classList.remove('sel-low','sel-med','sel-high'));
        btn.classList.add(val === 'medium' ? 'sel-med' : 'sel-' + val);
    };

    window.submitReport = () => {
        const text = document.getElementById('fb-text').value;
        if(!selCat || !selSev || !text) return alert("Complete all fields!");
        push(reportsRef, { cat: selCat, sev: selSev, text: text, date: new Date().toLocaleDateString() });
        alert("Sent!");
        document.getElementById('fb-text').value = '';
    };

    onValue(reportsRef, (snap) => {
        const data = snap.val();
        const grid = document.getElementById('board-grid');
        grid.innerHTML = '';
        for(let id in data) {
            const r = data[id];
            grid.innerHTML += `<div class="card">
                <span class="badge sel-${r.cat}">${r.cat}</span>
                <span class="badge ${r.sev === 'medium' ? 'sel-med' : 'sel-' + r.sev}">${r.sev}</span>
                <p><b>${r.text}</b></p>
                <small>${r.date}</small>
            </div>`;
        }
    });
</script>
</body>
</html>
