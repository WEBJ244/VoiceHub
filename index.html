<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Hub</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&family=Permanent+Marker&display=swap');

        :root {
            --comic-yellow: #FFF8B0;
            --comic-blue: #B0E0E6;
            --comic-red: #FF6B6B;
            --comic-green: #C1F0C1;
            --ink-black: #222222;
            --halftone: radial-gradient(rgba(0,0,0,0.1) 1px, transparent 0);
        }

        body {
            background-color: #f0f0f0;
            background-image: var(--halftone);
            background-size: 20px 20px;
            font-family: 'Comic Neue', cursive;
            margin: 0; padding: 0;
        }

        .portal { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        .header {
            text-align: center;
            background: var(--comic-yellow);
            border: 4px solid var(--ink-black);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 10px 10px 0px var(--ink-black);
            transform: rotate(-1deg);
        }

        .brand-icon {
            width: 60px; height: 60px;
            background: var(--ink-black);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid white;
        }
        .brand-icon svg { width: 35px; height: 35px; fill: var(--comic-yellow); }
        .brand-name { font-family: 'Bangers', cursive; font-size: 50px; margin: 0; letter-spacing: 2px; }

        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab {
            flex: 1; padding: 12px; font-family: 'Bangers', cursive; font-size: 20px;
            border: 4px solid var(--ink-black); background: white;
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black);
        }
        .tab.active { background: var(--comic-blue); transform: translate(3px, 3px); box-shadow: 2px 2px 0px var(--ink-black); }

        .section { display: none; }
        .section.active { display: block; }

        .card {
            background: white; border: 4px solid var(--ink-black);
            padding: 20px; margin-bottom: 25px; box-shadow: 8px 8px 0px var(--ink-black);
        }

        .lbl { font-family: 'Bangers', cursive; font-size: 22px; display: block; margin-bottom: 12px; }
        
        .choice-btn {
            padding: 8px 18px; border: 3px solid var(--ink-black);
            font-family: 'Bangers', cursive; cursor: pointer; background: white;
            box-shadow: 4px 4px 0px var(--ink-black); margin-right: 10px; margin-bottom: 10px;
        }

        .sel-low, .sel-wellbeing { background: var(--comic-green) !important; }
        .sel-med, .sel-management { background: var(--comic-yellow) !important; }
        .sel-high, .sel-conflict { background: var(--comic-red) !important; color: white; }
        .sel-policy { background: var(--comic-blue) !important; }

        .msg-area { 
            width: 100%; height: 150px; border: 4px solid var(--ink-black); 
            padding: 12px; font-family: inherit; font-size: 18px; font-weight: bold; 
        }

        .submit-btn {
            width: 100%; padding: 18px; background: var(--comic-red); color: white;
            font-family: 'Bangers', cursive; font-size: 28px; border: 4px solid var(--ink-black);
            cursor: pointer; box-shadow: 6px 6px 0px var(--ink-black);
        }

        .guidelines-note {
            background: var(--comic-blue);
            border: 3px solid var(--ink-black);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 5px 5px 0px var(--ink-black);
        }

        .gate-wrap { text-align: center; padding: 40px 0; }
        .gate-wrap input { 
            padding: 12px; border: 4px solid var(--ink-black); 
            font-size: 20px; font-family: 'Bangers', cursive; width: 250px;
        }
    </style>
</head>
<body>

<div class="portal">
    <div class="header">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
        </div>
        <h1 class="brand-name">Voice Hub</h1>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="showTab('submit', this)">DISPATCH</button>
        <button class="tab" onclick="showTab('board', this)">THE HUB</button>
        <button class="tab" id="admin-tab-btn" onclick="showTab('admin', this)">ADMIN HQ</button>
    </div>

    <div id="submit" class="section active">
        <details class="guidelines-note">
            <summary style="font-family:'Bangers'; font-size: 20px; cursor:pointer; list-style: none;">
                THE CODE OF CONDUCT (READ THIS!) ▼
            </summary>
            <div style="margin-top:10px; font-family: 'Comic Neue';">
                <p><strong>NO HATE</strong> — Keep it professional.</p>
                <p><strong>NO POLITICS</strong> — Save the debates for the Town hall.</p>
                <p><strong>STAY CIVIL</strong> — Be Kind.</p>
            </div>
        </details>

        <div class="card">
            <label class="lbl">CATEGORY</label>
            <div id="cat-group">
                <button class="choice-btn" onclick="setCat('conflict', this)">Conflict</button>
                <button class="choice-btn" onclick="setCat('management', this)">Management</button>
                <button class="choice-btn" onclick="setCat('policy', this)">Policy</button>
                <button class="choice-btn" onclick="setCat('wellbeing', this)">Wellbeing</button>
            </div>

            <label class="lbl">URGENCY</label>
            <div id="sev-group">
                <button class="choice-btn" onclick="setSev('low', this)">Low</button>
                <button class="choice-btn" onclick="setSev('medium', this)">Medium</button>
                <button class="choice-btn" onclick="setSev('high', this)">High</button>
            </div>

            <label class="lbl">MESSAGE</label>
            <textarea id="fb-text" class="msg-area" placeholder="Enter your dispatch..."></textarea>
            <br><br>
            <button class="submit-btn" onclick="submitReport()">SEND TO HUB!</button>
        </div>
    </div>

    <div id="board" class="section">
        <div id="board-grid"></div>
    </div>

    <div id="admin" class="section">
        <div id="admin-gate" class="card gate-wrap">
            <label class="lbl">ADMIN CLEARANCE REQUIRED</label>
            <input type="password" id="admin-pw" placeholder="Enter Key...">
            <br><br>
            <button class="choice-btn" onclick="login()">UNLOCK HQ</button>
        </div>
        <div id="admin-panel" style="display:none;">
            <div class="card">
                <label class="lbl">ADMIN DASHBOARD</label>
                <div id="admin-list"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const PASS = 'Chat2026'; // Your Admin Password
    let reports = [];
    let selCat = ''; 
    let selSev = '';

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function setCat(val, btn) {
        selCat = val;
        document.querySelectorAll('#cat-group .choice-btn').forEach(b => b.className = 'choice-btn');
        btn.classList.add('sel-' + val);
    }

    function setSev(val, btn) {
        selSev = val;
        document.querySelectorAll('#sev-group .choice-btn').forEach(b => b.className = 'choice-btn');
        btn.classList.add(val === 'medium' ? 'sel-med' : 'sel-' + val);
    }

    function login() {
        if(document.getElementById('admin-pw').value === PASS) {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("ACCESS DENIED!");
        }
    }

    function submitReport() {
        const text = document.getElementById('fb-text').value;
        if(!selCat || !selSev || !text) return alert("Complete the dispatch!");
        
        const newReport = { cat: selCat, sev: selSev, text: text, date: new Date().toLocaleDateString() };
        reports.unshift(newReport);
        
        alert("KAPOW! Dispatch Sent.");
        renderHub();
        document.getElementById('fb-text').value = '';
        selCat = ''; selSev = '';
        document.querySelectorAll('.choice-btn').forEach(b => b.className = 'choice-btn');
    }

    function renderHub() {
        const grid = document.getElementById('board-grid');
        const adminGrid = document.getElementById('admin-list');
        grid.innerHTML = '';
        adminGrid.innerHTML = '';

        reports.forEach((r, index) => {
            const cardHtml = `
                <div class="card">
                    <span class="lbl sel-${r.cat}" style="display:inline-block; padding: 2px 8px; border: 2px solid black;">${r.cat.toUpperCase()}</span>
                    <p style="font-size: 20px; font-weight: bold; margin: 15px 0;">"${r.text}"</p>
                    <small style="font-family: 'Permanent Marker';">LOGGED: ${r.date}</small>
                </div>`;
            grid.innerHTML += cardHtml;
            adminGrid.innerHTML += cardHtml + `<button class="choice-btn sel-high" onclick="deleteReport(${index})">DELETE FOREVER</button><hr>`;
        });
    }

    function deleteReport(index) {
        if(confirm("Erase this dispatch?")) {
            reports.splice(index, 1);
            renderHub();
        }
    }
</script>
</body>
</html>
